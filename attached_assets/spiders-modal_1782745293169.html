<div id="jobs-settings-modal" class="modal fade">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    Job Settings
                </h5>
                <button type="button" class="btn close" data-bs-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-sm-12 col-md-12">
                        <div class="form-group">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label mb-0">Tournament Url</label>
                                <label class="custom-switch mb-0">
                                    <input id="tournament-url-toggle" type="checkbox" value="1" class="custom-switch-input">
                                    <span class="custom-switch-indicator"></span>
                                </label>
                            </div>
                            <div id="tournament-url-group" class="input-group"></div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 col-md-12">
                        <div class="form-group">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label mb-0">Api Key</label>
                            </div>
                            <div class="input-group">
                                <div class="input-group-text">
                                    <i class="fe fe-award tx-16 lh-0 op-6"></i>
                                </div>
                                <input id="api-key" type="text" class="form-control">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 col-md-12">
                        <div class="form-group">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label mb-0">SSID</label>
                            </div>
                            <div class="input-group">
                                <div class="input-group-text">
                                    <i class="fe fe-award tx-16 lh-0 op-6"></i>
                                </div>
                                <input id="ssid" type="text" class="form-control">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 col-md-12">
                        <div class="form-group">
                            <label class="form-label">Schedule Type</label>
                            <div class="input-group">
                                <div class="input-group-text">
                                    <i class="fe fe-calendar tx-16 lh-0 op-6"></i>
                                </div>
                                 <select id="schedule-type" class="form-control select2">
                                    <option value="daily">Daily</option>
                                    <option value="weekly">Weekly</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 col-md-12">
                        <div class="form-group">
                            <label class="form-label">Schedule Day</label>
                            <div class="input-group">
                                <div class="input-group-text">
                                    <i class="fe fe-repeat tx-16 lh-0 op-6"></i>
                                </div>
                                <select id="schedule-day" class="form-control select2">

                                    <option value="tuesday">Tuesday</option>
                                    <option value="wednesday">Wednesday</option>
                                    <option value="thursday">Thursday</option>
                                    <option value="friday">Friday</option>
                                    <option value="saturday">Saturday</option>
                                    <option value="sunday">Sunday</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 col-md-12">
                        <div class="form-group">
                            <label class="form-label">Schedule Time</label>
                            <div class="input-group">
                                <div class="input-group-text">
                                    <i class="fe fe-clock tx-16 lh-0 op-6"></i>
                                </div>
                                <input id="schedule-time" type="text" class="form-control">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 col-md-12">
                        <div class="form-group">
                            <label class="form-label">Rank Type</label>
                           <div class="input-group">
                                <div class="input-group-text">
                                    <i class="fe fe-users tx-16 lh-0 op-6"></i>
                                </div>
                                <select id="rank-type" class="form-control">
                                    <option value="Singles">Singles</option>
                                    <option value="Doubles">Doubles</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 col-md-12">
                        <div class="form-group">
                            <label class="form-label">Gender</label>
                           <div class="input-group">
                                <div class="input-group-text">
                                    <i class="fe fe-users tx-16 lh-0 op-6"></i>
                                </div>
                                <select id="gender" class="form-control">
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                    <div class="col-sm-12 col-md-12">

                                    <label class="custom-switch mb-0">
                                        <input id="bi-weekly-toggle" type="checkbox" value="0" class="custom-switch-input">

                                    </label>
                                    <label class="form-label mb-2">-</label>
                                    <input id="bi-weekly-number" type="number" value="15" min="0" step="1" class="form-control" style="width:80px;" disabled>
                                </div>
                            </div>
                            <input id="range-date" type="text" class="form-control">

                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 col-md-12">

                            <div class="input-group">

                                </div>
                                <input id="single-date" type="text" class="form-control">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 col-md-12">
                        <div class="form-group">
                            <label class="form-label">Rank Year</label>
                           <div class="input-group">

                                    <option value="2029">2029</option>
                                    <option value="2028">2028</option>
                                    <option value="2027">2027</option>
                                    <option value="2026">2026</option>
                                    <option value="2025">2025</option>
                                    <option value="2024">2024</option>
                                    <option value="2023">2023</option>
                                    <option value="2022">2022</option>
                                    <option value="2021">2021</option>
                                    <option value="2020">2020</option>
                                    <option value="2019">2019</option>
                                    <option value="2018">2018</option>
                                    <option value="2017">2017</option>
                                    <option value="2016">2016</option>
                                    <option value="2015">2015</option>
                                    <option value="2014">2014</option>
                                    <option value="2013">2013</option>
                                    <option value="2012">2012</option>
                                    <option value="2011">2011</option>
                                    <option value="2010">2010</option>
                                    <option value="2009">2009</option>
                                    <option value="2008">2008</option>
                                    <option value="2007">2007</option>
                                    <option value="2006">2006</option>
                                    <option value="2005">2005</option>
                                    <option value="2004">2004</option>
                                    <option value="2003">2003</option>
                                    <option value="2002">2002</option>
                                    <option value="2001">2001</option>
                                    <option value="2000">2000</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-sm-12 col-md-12">
                        <div class="form-group">
                            <label class="form-label">Month</label>
                           <div class="input-group">
                                <div class="input-group-text">
                                    <i class="fe fe-calendar tx-16 lh-0 op-6"></i>
                                </div>
                                <select id="month" class="form-control">
                                  <option value="0">All</option>
                                  <option value="1">January</option>
                                  <option value="2">February</option>
                                  <option value="3">March</option>
                                  <option value="4">April</option>
                                  <option value="5">May</option>
                                  <option value="6">June</option>
                                  <option value="7">July</option>

                                  <option value="11">November</option>
                                  <option value="12">December</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary close" data-bs-dismiss="modal"><i class="fe fe-x"></i> Cancel</button>
                <button id="create-job" class="btn btn-primary" style="display: unset"><i class="fe fe-plus"></i> Create</button>
            </div>
        </div>
    </div>
</div>
