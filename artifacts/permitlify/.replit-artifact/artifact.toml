kind = "web"
previewPath = "/"
title = "MatchMiner"
version = "1.0.0"
id = "artifacts/permitlify"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22712

[services.development]
run = "python3 manage.py runserver 0.0.0.0:$PORT --noreload"

[services.production.build]
args = ["sh", "-c", "python3 manage.py collectstatic --noinput && python3 manage.py migrate --noinput"]

[services.production.build.env]
DJANGO_DEBUG = "False"

[services.production.run]
args = ["sh", "-c", "gunicorn matchminer.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"]

[services.production.run.env]
DJANGO_DEBUG = "False"

[services.env]
PORT = "22712"
BASE_PATH = "/"
